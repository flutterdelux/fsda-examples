name: app_ui
description: Generated by FSDA CLI
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.10.7 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  app_core:
    path: ../app_core
  app_l10n:
    path: ../app_l10n
  shimmer: ^3.0.0
  gap: ^3.0.1
  extended_image: ^10.1.0
  flutter_colorpicker: ^1.1.0
  dotted_border: ^3.1.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
  - family: Inter
    fonts:
      - asset: assets/fonts/inter/Inter-Light.ttf
        weight: 300
      - asset: assets/fonts/inter/Inter-Regular.ttf
        weight: 400
      - asset: assets/fonts/inter/Inter-Medium.ttf
        weight: 500
      - asset: assets/fonts/inter/Inter-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/inter/Inter-Bold.ttf
        weight: 700

